{% extends "view-elements.html" %}

{% block name %}
Attorney
{% endblock name %}

{% block columns %}
<tr> 
    <th>ID</th> 
    <th>Attorney Name</th> 
</tr>
{% endblock columns %}

{% block rows %}
{% for attorney in attorneys %}
<tr class="table-row">
    <td data-field="id">{{ attorney.id }}</td> 
    <td data-field="name">{{ attorney.name }}</td>  
</tr>
{% endfor %}
{% endblock rows %}

{% block form %} 
<input type="hidden" name="id">
<label> Name:
    <input type="text" name="name">
</label>  
<label> Password:
    <input type="password" name="password">
</label>  
{% endblock form %}
